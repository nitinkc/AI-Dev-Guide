site_name: AI Developer Guide
site_description: A comprehensive learning portal for modern AI-powered development automation — agents, RAG, MCP, LangGraph, and beyond.
site_author: Architecture Learning Series

theme:
  name: mkdocs

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - abbr
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js
  - https://unpkg.com/mermaid@10/dist/mermaid.js
  - js/mermaid-init.js
  - js/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
#  - js/tooltips.js

extra_css:
  - https://unpkg.com/mermaid@10/dist/mermaid.css
  - css/myCss.css

